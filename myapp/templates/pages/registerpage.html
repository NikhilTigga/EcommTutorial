{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .register-container{
            width:400px;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .register-container h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .form-group{
            margin-bottom:15px;
        }

        .form-group label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#555;
        }

        .form-group input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            outline:none;
        }

        .form-group input:focus{
            border-color:#007bff;
        }

        .profile-preview{
            width:100px;
            height:100px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #ddd;
            display:block;
            margin:10px auto;
        }

        .btn-register{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        .btn-register:hover{
            background:#0056b3;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

        .login-link a{
            color:#007bff;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Create Account</h2>

    <form method="POST" enctype="multipart/form-data" action="{% url 'registerviewform' %}">
        <!-- Django CSRF -->

           {% csrf_token %}
        <!-- {% csrf_token %} -->

        <img id="preview" src="https://via.placeholder.com/100" class="profile-preview">

        <div class="form-group">
            <label>Profile Picture</label>
            <input type="file" name="profile_picture" id="profilePicture" accept="image/*">
        </div>

        <div class="form-group">
            <label>Username</label>
            <input
                type="text"
                name="username"
                placeholder="Enter username"
                required
            >
        </div>

        <div class="form-group">
            <label>Email</label>
            <input
                type="email"
                name="email"
                placeholder="Enter email"
                required
            >
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter password"
                required
            >
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm password"
                required
            >
        </div>

        <button type="submit" class="btn-register">
            Register
        </button>

        <div class="login-link">
            Already have an account?
            <a href="{% url 'loginpage' %}">Login</a>
        </div>
    </form>
</div>



</body>
</html>
